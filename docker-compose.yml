version: "3.8"

services:
  app:
    build: ./docker/php
    container_name: book_log_laravel_app
    volumes:
      - ./backend:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: app_db
      DB_USERNAME: user
      DB_PASSWORD: password
    command: sh -c "[ -f /var/www/html/vendor/autoload.php ] || composer install --no-interaction && php-fpm"

  nginx:
    image: nginx:alpine
    container_name: book_log_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  frontend:
    image: node:24-alpine
    container_name: book_log_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

  db:
    image: mysql:8.0
    container_name: book_log_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3308:3306"

volumes:
  vendor_data: