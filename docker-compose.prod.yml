services:
  app:
    build: ./docker/php
    container_name: book_log_laravel_app
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: php artisan serve --host=0.0.0.0 --port=8000

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE=/api
        - VITE_API_BASE_URL=/api
    image: book_log_frontend_prod
    container_name: book_log_frontend
    ports:
      - 81:80

  db:
    image: mysql:8.0
    container_name: book_log_mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db_data:
